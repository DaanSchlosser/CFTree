name: cftree
channels:
  - conda-forge
  - defaults

dependencies:
  # --- Core Python ---
  - python=3.11
  - numpy
  - scipy
  - pandas
  - scikit-learn

  # --- Geospatial stack ---
  - geopandas
  - shapely
  - fiona
  - rasterio
  - pyproj
  - rtree
  - gdal
  - pyogrio
  - affine
  - mapclassify

  # --- Point cloud processing ---
  - laspy
  - python-pdal
  - pdal
  - richdem  # optional but common for DTM processing

  # --- 3D geometry and visualization ---
  - trimesh
  - networkx
  - matplotlib

  # --- Parallelization and utilities ---
  - joblib
  - requests
  - psutil

  # --- Dev / linting ---
  - ruff
  - mypy
  - pyright

  # --- C++ build toolchain (for AlphaWrap and TreeSeparation) ---
  - cmake
  - make
  - gxx_linux-64        # Linux toolchain (use clangxx_osx-64 on macOS)
  - boost-cpp
  - eigen
  - cgal

  # --- Pip packages ---
  - pip
  - pip:
      # embreex provides the embree ray-mesh acceleration that trimesh 4.x
      # uses for `mesh.contains()`. Without it trimesh silently falls back
      # to pure-Python ray casting, which is orders of magnitude slower and
      # allocates many GB on moderate inputs (causes OOM in reconstruction).
      # The 2.17.7.post* line wraps embree 2.17.7 (the conda-forge version).
      - embreex==2.17.7.post7
      # GPU acceleration of the two dominant per-tree morphometrics (r50 and
      # porosity), used by src/reconstruction/gpu_metrics.py and enabled with
      # CFTREE_GPU_METRICS=1. The GPU-accelerated part is the watertight
      # inside/outside test (Warp winding number); the r50 nearest-neighbour
      # query stays on scipy's cKDTree, so Warp is the only GPU dependency.
      # warp-lang bundles its own CUDA components (no CUDA toolkit needed in the
      # image; an NVIDIA driver plus, for Docker, the nvidia-container-toolkit on
      # the host is enough) and falls back to CPU. On a machine with no NVIDIA
      # GPU it installs fine and gpu_metrics.gpu_available() returns False.
      - warp-lang
      # - cityjson
      # - pycityjson
      # - pdal-plugins
